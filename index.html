<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutletPro — Sistema de Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #090b13;
            --card: #101527;
            --text: #e9ecff;
            --text2: #9aa3c7;
            --border: #2a3047;
            --accent: #7c6dff;
            --accent2: #b97fff;
            --ok: #00d4aa;
            --danger: #ff5272;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(1200px 700px at 20% -10%, #1c2142 0%, var(--bg) 48%), var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 460px;
        }
        
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo {
            font-family: 'Syne', sans-serif;
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        .login-subtitle {
            font-size: 13px;
            color: var(--text2);
            font-weight: 500;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input {
            background: #0d1120;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 13px 14px;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        input:focus {
            border-color: var(--accent);
            background: #121936;
            box-shadow: 0 0 0 3px rgba(124, 109, 255, 0.1);
        }
        
        input::placeholder {
            color: var(--text2);
        }
        
        button {
            background: linear-gradient(135deg, var(--accent), #9d6dff);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 13px 18px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }
        
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 26px rgba(124, 109, 255, 0.45);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .error-box {
            background: rgba(255, 82, 114, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: var(--danger);
            display: none;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 500;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--text2);
        }
        
        .loading {
            display: none;
            text-align: center;
            color: var(--text2);
            font-size: 12px;
            margin-top: 16px;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(124, 109, 255, 0.2);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body { padding: 14px; }
            .login-wrapper { max-width: 100%; }
            .login-card { padding: 24px 18px; border-radius: 12px; }
            .login-logo { font-size: 30px; }
            .login-subtitle { font-size: 12px; }
            button { width: 100%; }
        }

        @media (max-width: 420px) {
            .login-card { padding: 20px 14px; }
            .login-logo { font-size: 26px; }
            .form-label { font-size: 10px; }
            input { font-size: 13px; padding: 11px 12px; }
            .login-footer { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">OutletPro</div>
                <div class="login-subtitle">Sistema de Gestão de Vendas</div>
            </div>
            
            <div class="error-box" id="errorMsg"></div>
            
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">� Email</label>
                    <input type="email" id="username" placeholder="Digite seu e-mail" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label class="form-label">🔐 Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
                </div>
                
                <button type="submit">Entrar no Sistema</button>
            </form>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div style="margin-top: 8px;">Autenticando...</div>
            </div>
            
            <div class="login-footer">
                <!-- Credenciais gerenciadas pelo servidor - veja documentação -->
            </div>
        </div>
    </div>
    
    <script>
        // Limpar localStorage antigo no carregamento
        console.log('[INIT] Limpando localStorage...');
        const keysToRemove = ['op_users', 'op_session_time', 'op_companies', 'op_sellers', 'op_produtos', 'op_vendas', 'op_notas'];
        keysToRemove.forEach(key => {
            const hadKey = localStorage.getItem(key);
            if (hadKey) {
                localStorage.removeItem(key);
                console.log('[INIT] Removido:', key);
            }
        });
        
        // Manter apenas token, session user, e portal session
        // Todos os outros dados virão da API
        console.log('[INIT] localStorage limpo. Pronto para novo login.');
    </script>

    <script>
        // Usuários carregados do servidor - sem credenciais hardcoded
        
        function handleLogin(event) {
            event.preventDefault();
            
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorMsg = document.getElementById('errorMsg');
            var loading = document.getElementById('loading');
            
            errorMsg.style.display = 'none';
            
            if (!username || !password) {
                showError('Preencha usuário e senha');
                return;
            }
            
            loading.style.display = 'block';
            
            // Simular delay de autenticação
            setTimeout(function() {
                performLogin(username, password, errorMsg, loading);
            }, 300);
        }
        
        function performLogin(user, pass, errorMsg, loading) {
            // Chamar API de autenticação
            const loginData = { email: user, password: pass };
            
            // Detectar URL da API automaticamente
            const API_BASE = window.location.hostname === 'localhost' 
                ? 'http://localhost:3000'
                : window.location.protocol + '//' + window.location.hostname + ':3000';
            
            const url = API_BASE + '/api/login';
            const method = 'POST';
            
            console.log('[LOGIN] Iniciando login...');
            console.log('[LOGIN] URL:', url);
            console.log('[LOGIN] Method:', method);
            console.log('[LOGIN] Data:', loginData);
            
            fetch(url, {
                method: method,
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(loginData)
            })
            .then(response => {
                console.log('[LOGIN] Response recebida:');
                console.log('  Status:', response.status);
                console.log('  StatusText:', response.statusText);
                console.log('  Content-Type:', response.headers.get('Content-Type'));
                console.log('  URL:', response.url);
                
                return response.text().then(text => {
                    console.log('[LOGIN] Response Body (primeiros 200 chars):', text.substring(0, 200));
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    // Se chegou aqui, tentar fazer JSON parse
                    try {
                        const data = JSON.parse(text);
                        return data;
                    } catch (e) {
                        console.error('[LOGIN] Erro ao fazer JSON.parse:');
                        console.error('  Text recebido:', text.substring(0, 300));
                        throw new Error(`JSON parse error: ${e.message}`);
                    }
                });
            })
            .then(data => {
                console.log('[LOGIN] ✓ Autenticação bem-sucedida!');
                console.log('[LOGIN] Usuário:', data.user);
                
                // Salvar token JWT
                localStorage.setItem('token', data.token);
                localStorage.setItem('op_session_user', JSON.stringify(data.user));
                localStorage.setItem('op_portal_session', JSON.stringify({
                    user: data.user.user,
                    role: data.user.type,
                    at: Date.now()
                }));
                
                console.log('[LOGIN] Redirecionando para:', data.user.type === 'master' ? 'master.html' : 'outlet-system_3.html');
                
                if (data.user.type === 'master') {
                    window.location.href = 'master.html';
                } else {
                    window.location.href = 'outlet-system_3.html';
                }
            })
            .catch(error => {
                console.error('[LOGIN] ✗ ERRO:', error);
                console.error('[LOGIN] Stack:', error.stack);
                showError('Erro ao processar login: ' + error.message);
                loading.style.display = 'none';
            });
        }
        
        function showError(msg) {
            var errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
        
        // Verificar se já está logado (se houver dados válidos em localStorage)
        window.addEventListener('load', function() {
            const token = localStorage.getItem('token');
            const portalSession = localStorage.getItem('op_portal_session');
            
            if (token && portalSession) {
                try {
                    const session = JSON.parse(portalSession);
                    if (session?.role === 'master') {
                        window.location.href = 'master.html';
                        return;
                    }
                    if (session?.user) {
                        window.location.href = 'outlet-system_3.html';
                        return;
                    }
                } catch (e) {
                    console.warn('Session inválida', e);
                }
            }
        });
    </script>
</body>
</html>
