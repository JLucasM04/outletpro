<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login OutletPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
        rel="stylesheet" />
  <style>
    body{font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#09090e;color:#eeeef5;}
    form{display:flex;flex-direction:column;gap:12px;width:300px;}
    input{padding:8px;border-radius:4px;border:1px solid #444;}
    button{padding:10px;border-radius:6px;background:#7c6dff;color:#fff;font-weight:600;}
  </style>
</head>
<body>
  <form id="loginForm">
    <h2>Entrar</h2>
    <input type="email" name="email" placeholder="E‑mail" required />
    <input type="password" name="password" placeholder="Senha" required />
    <button type="submit">Entrar</button>
    <p id="error" style="color:#ff6b9d"></p>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      const data = { email: form.email.value, password: form.password.value };
      const res = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      if (!res.ok) {
        document.getElementById('error').textContent='Credenciais inválidas';
        return;
      }
      const { token } = await res.json();
      localStorage.setItem('token', token);
      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
