<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OutletPro — Admin Master</title>
    <style>
        :root{--bg:#090b13;--bg2:#121629;--card:#111524;--card-soft:#171c2e;--text:#e9ecff;--muted:#9aa3c7;--line:#2a3047;--accent:#7c6dff;--accent2:#b97fff;--danger:#ff6b88}
        *{box-sizing:border-box}
        body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:radial-gradient(1200px 800px at 20% -10%,#1b2040 0%,var(--bg) 45%),var(--bg);color:var(--text);padding:26px}
        .card{background:linear-gradient(180deg,var(--card) 0%,#0f1322 100%);padding:24px;border-radius:14px;max-width:1100px;margin:20px auto;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.45)}
        header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
        header h1{margin:0;text-align:left;font-size:42px;letter-spacing:-.5px}
        h2{margin:0;color:#fff;font-size:36px;letter-spacing:-.5px}
        .btn-logout{background:#2b1730;border:1px solid #4e2a56;color:#ffb7c6;padding:9px 14px;border-radius:10px;font-weight:700;cursor:pointer;white-space:nowrap}
        .btn-logout:hover{filter:brightness(1.08)}
        .tabs{display:flex;gap:10px;justify-content:center;margin:8px 0 20px}
        .tabs button{padding:10px 16px;border-radius:10px;border:1px solid var(--line);background:#141a2b;color:var(--text);cursor:pointer;font-weight:600}
        .tabs button.active{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 8px 24px rgba(124,109,255,.35)}
        .tab-panel{display:none}
        .tab-panel.active{display:block}
        section > div:first-child{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        form{display:grid;gap:12px;background:var(--card-soft);border:1px solid var(--line);padding:14px;border-radius:12px}
        label{font-size:13px;color:var(--muted);font-weight:600}
        input,select{padding:10px 12px;border-radius:8px;border:1px solid var(--line);background:#0e1220;color:var(--text)}
        input:focus,select:focus{outline:none;border-color:var(--accent)}
        button{padding:10px 14px;border-radius:8px;border:1px solid transparent;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;font-weight:700;cursor:pointer}
        button:hover{filter:brightness(1.06)}
        #btn-cancel-client,#btn-cancel-contract,#btn-cancel-user{background:#1a2136;border:1px solid var(--line);color:#dbe2ff}
        .actions{display:flex;gap:8px}
        .actions button,.btn-small{padding:7px 12px;font-size:13px;border-radius:8px;min-width:86px}
        .actions .del-client,.actions .del-contract,.actions .del-user{background:#2b1730;border:1px solid #4e2a56;color:#ffb7c6}
        .small{font-size:12px;color:var(--muted)}
        table{width:100%;border-collapse:separate;border-spacing:0;margin-top:12px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#0d1120}
        thead th{background:#171d32;color:#e5e9ff;font-size:13px}
        th,td{padding:12px 10px;border-bottom:1px solid #242b42;font-size:14px;text-align:left}
        tbody tr:last-child td{border-bottom:none}
        tbody tr:hover{background:#151b30}
        .error{color:#ff8ca3;font-size:13px}

        @media (max-width: 900px){
            body{padding:14px}
            .card{padding:16px}
            header{align-items:flex-start;flex-direction:column}
            header h1{font-size:32px}
            h2{font-size:28px}
            #user-form{flex-wrap:wrap}
            #user-form > div{min-width:220px}
        }

        @media (max-width: 680px){
            header h1{font-size:26px}
            h2{font-size:22px}
            .tabs{justify-content:flex-start;overflow:auto;padding-bottom:6px}
            .tabs button{white-space:nowrap}
            section > div:first-child{gap:10px;align-items:flex-start;flex-direction:column}
            table{display:block;overflow:auto;white-space:nowrap}
            th,td{padding:10px 8px;font-size:13px}
            .actions{gap:6px}
            .actions button,.btn-small{min-width:80px;font-size:12px;padding:6px 10px}
            #client-form-wrap > form > div[style*="display:flex"],
            #contract-form-wrap > form > div[style*="display:flex"]{flex-direction:column}
        }
    </style>
</head>
<body>
    <div class="card">
        <header>
            <h1>OutletPro — Painel Master</h1>
            <button class="btn-logout" onclick="logoutMaster()">🚪 Deslogar</button>
        </header>

        <div class="tabs" role="tablist">
            <button data-tab="clients" class="active">Clientes</button>
            <button data-tab="contracts">Contratos</button>
            <button data-tab="users">Usuários</button>
        </div>

        <section id="clients" class="tab-panel active" aria-hidden="false">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <h2>Clientes</h2>
                <button id="btn-new-client">+ Novo cliente</button>
            </div>

            <div id="client-form-wrap" style="display:none;margin-top:12px">
                <form id="client-form">
                    <div>
                        <label>Razão social *</label>
                        <input id="company-legal-name" required />
                    </div>
                    <div>
                        <label>Nome fantasia</label>
                        <input id="company-name" />
                    </div>
                    <div>
                        <label>CNPJ * (14 dígitos)</label>
                        <input id="company-cnpj" maxlength="14" inputmode="numeric" />
                        <div class="small">Somente números. Exemplo: 12345678000195</div>
                        <div id="cnpj-error" class="error" style="display:none"></div>
                    </div>
                    <div>
                        <label>UF *</label>
                        <select id="company-uf" required>
                            <option value="">Selecione</option>
                            <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                            <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                            <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                            <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                            <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                            <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                            <option>SP</option><option>SE</option><option>TO</option>
                        </select>
                    </div>
                    <div style="display:flex;gap:8px">
                        <button type="submit" style="min-width:140px;font-size:15px;padding:12px 0;">Salvar cliente</button>
                        <button type="button" id="btn-cancel-client" style="min-width:110px;font-size:15px;padding:12px 0;background:#222;color:#fff;">Cancelar</button>
                    </div>
                </form>
            </div>

            <div id="clients-list" style="margin-top:14px">
                <table>
                    <thead><tr><th>Razão social</th><th>CNPJ</th><th>UF</th><th>Contratos ativos</th><th>Ações</th></tr></thead>
                    <tbody id="clients-tbody"></tbody>
                </table>
            </div>
        </section>

        <section id="contracts" class="tab-panel" aria-hidden="true">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <h2>Contratos</h2>
                <button id="btn-new-contract">+ Novo contrato</button>
            </div>

            <div id="contract-form-wrap" style="display:none;margin-top:12px">
                <form id="contract-form">
                    <div>
                        <label>Empresa (cliente) *</label>
                        <select id="contract-company" required></select>
                    </div>
                    <div>
                        <label>Início da vigência *</label>
                        <input id="contract-start" type="date" required />
                    </div>
                    <div>
                        <label>Fim da vigência *</label>
                        <input id="contract-end" type="date" required />
                    </div>
                    <div>
                        <label>Módulos disponíveis</label>
                        <div>
                            <label><input type="checkbox" class="module-checkbox" value="dashboard" /> Dashboard</label>
                            <label><input type="checkbox" class="module-checkbox" value="vendas" /> Vendas</label>
                            <label><input type="checkbox" class="module-checkbox" value="produtos" /> Produtos</label>
                            <label><input type="checkbox" class="module-checkbox" value="estoque" /> Estoque</label>
                            <label><input type="checkbox" class="module-checkbox" value="notas" /> Notas Fiscais</label>
                            <label><input type="checkbox" class="module-checkbox" value="relatorios" /> Relatórios</label>
                            <label><input type="checkbox" class="module-checkbox" value="vendedores" /> Vendedores</label>
                        </div>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:6px">
                        <button type="submit">Salvar contrato</button>
                        <button type="button" id="btn-cancel-contract">Cancelar</button>
                    </div>
                </form>
            </div>

            <div id="contracts-list" style="margin-top:12px">
                <table>
                    <thead><tr><th>Empresa</th><th>Vigência</th><th>Status</th><th>Módulos</th><th>Ações</th></tr></thead>
                    <tbody id="contracts-tbody"></tbody>
                </table>
            </div>
        </section>

        <section id="users" class="tab-panel" aria-hidden="true">
            <h2>Usuários</h2>
            <div style="margin-top:8px">
                <form id="user-form" style="display:flex;gap:8px;align-items:end">
                    <div style="flex:1">
                        <label>Usuário (login) *</label>
                        <input id="user-login" required />
                    </div>
                    <div style="flex:1">
                        <label>Senha *</label>
                        <input id="user-pass" type="password" required />
                    </div>
                    <div style="flex:1">
                        <label>Empresa *</label>
                        <select id="user-company" required></select>
                    </div>
                    <div>
                        <button type="submit">Criar usuário</button>
                    </div>
                    <div>
                        <button type="button" id="btn-cancel-user" style="display:none;min-width:120px;font-size:14px;padding:10px 0;">Cancelar edição</button>
                    </div>
                </form>
            </div>

            <div style="margin-top:12px">
                <table>
                    <thead><tr><th>Usuário</th><th>Empresa</th><th>Ações</th></tr></thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </div>
        </section>

    </div>

    <script>
        // Storage keys
        const KEY_CLIENTS = 'op_clients';
        const KEY_CONTRACTS = 'op_contracts';
        const KEY_USERS = 'op_users';
        let editingUserId = null;

        // utils
        const $ = id => document.getElementById(id);
        const save = (k,v)=> localStorage.setItem(k,JSON.stringify(v));
        const load = k => JSON.parse(localStorage.getItem(k)||'[]');

        // initial sample (only if empty)
        if(!localStorage.getItem(KEY_CLIENTS)){
            save(KEY_CLIENTS, [{id:1,legal:'OutletPro Master',name:'OutletPro',cnpj:'00000000000000',uf:'SP'}]);
        }
        if(!localStorage.getItem(KEY_CONTRACTS)){
            const now = new Date(); const start = now.toISOString().slice(0,10);
            const later = new Date(now.getFullYear()+1,now.getMonth(),now.getDate()).toISOString().slice(0,10);
            save(KEY_CONTRACTS, [{id:1,companyId:1,start, end: later, modules:['dashboard','vendas','produtos','estoque','relatorios']}]);
        }
        if(!localStorage.getItem(KEY_USERS)){
            save(KEY_USERS, [{id:1,login:'master',pass:'123',companyId:1}]);
        }

        // Tabs
        document.querySelectorAll('.tabs button').forEach(btn=>{
            btn.addEventListener('click', ()=>{
                document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-panel').forEach(p=>{
                    p.id===tab ? (p.classList.add('active'), p.setAttribute('aria-hidden','false')) : (p.classList.remove('active'), p.setAttribute('aria-hidden','true'));
                });
                renderAll();
            });
        });

        // CLIENTS
        function renderClients(){
            const clients = load(KEY_CLIENTS);
            const tbody = $('clients-tbody'); tbody.innerHTML = '';
            clients.forEach(c=>{
                const contracts = load(KEY_CONTRACTS).filter(ct=>ct.companyId===c.id && new Date(ct.end) >= new Date()).length;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${c.legal}<div class=\"small\">${c.name||''}</div></td>
                                                <td>${c.cnpj}</td>
                                                <td>${c.uf}</td>
                                                <td>${contracts}</td>
                                                <td class=\"actions\">
                                                    <button data-id=\"${c.id}\" class=\"edit-client btn-small\">Editar</button>
                                                    <button data-id=\"${c.id}\" class=\"del-client btn-small\">Remover</button>
                                                </td>`;
                tbody.appendChild(tr);
            });
            // attach actions
            tbody.querySelectorAll('.del-client').forEach(b=>b.addEventListener('click', e=>{
                const id=+e.target.dataset.id;
                if(confirm('Remover cliente?')) {
                    save(KEY_CLIENTS, load(KEY_CLIENTS).filter(x=>x.id!==id));
                    // also remove contracts and unassign users
                    save(KEY_CONTRACTS, load(KEY_CONTRACTS).filter(c=>c.companyId!==id));
                    const users = load(KEY_USERS).map(u=> u.companyId===id ? {...u,companyId:null} : u);
                    save(KEY_USERS, users);
                    renderAll();
                }
            }));
            tbody.querySelectorAll('.edit-client').forEach(b=>b.addEventListener('click', e=>{
                const id = +e.target.dataset.id;
                const client = clients.find(c=>c.id===id);
                if(client){
                    $('client-form-wrap').style.display='block';
                    $('company-legal-name').value = client.legal;
                    $('company-name').value = client.name;
                    $('company-cnpj').value = client.cnpj;
                    $('company-uf').value = client.uf;
                    // Troca texto do botão para 'Salvar'
                    const btn = $('client-form').querySelector('button[type="submit"]');
                    const originalText = btn.textContent;
                    btn.textContent = 'Salvar';
                    $('client-form').onsubmit = function(ev){
                        ev.preventDefault();
                        let legal = $('company-legal-name').value.trim();
                        let name = $('company-name').value.trim();
                        let cnpj = $('company-cnpj').value.replace(/\D/g,'');
                        let uf = $('company-uf').value;
                        $('cnpj-error').style.display = 'none';
                        if(!legal || !cnpj || !uf){ alert('Preencha os campos obrigatórios'); return; }
                        if(cnpj.length !== 14 || !/^\d{14}$/.test(cnpj)){
                            $('cnpj-error').textContent = 'CNPJ deve ter exatamente 14 dígitos numéricos';
                            $('cnpj-error').style.display = 'block';
                            return;
                        }
                        const all = load(KEY_CLIENTS);
                        const idx = all.findIndex(c=>c.id===id);
                        if(idx>-1){
                            all[idx] = {id, legal, name, cnpj, uf};
                            save(KEY_CLIENTS, all);
                        }
                        $('client-form').reset();
                        $('client-form-wrap').style.display='none';
                        $('cnpj-error').style.display='none';
                        btn.textContent = originalText;
                        $('client-form').onsubmit = null;
                        renderAll();
                    };
                    // Ao cancelar, restaurar botão e onsubmit
                    $('btn-cancel-client').onclick = function(){
                        $('client-form-wrap').style.display='none';
                        $('client-form').reset();
                        $('cnpj-error').style.display='none';
                        btn.textContent = originalText;
                        $('client-form').onsubmit = null;
                        $('btn-cancel-client').onclick = null;
                    };
                }
            }));
        }

        // new client form toggle
        $('btn-new-client').addEventListener('click', ()=> $('client-form-wrap').style.display='block');
        $('btn-cancel-client').addEventListener('click', ()=> { $('client-form-wrap').style.display='none'; $('client-form').reset(); $('cnpj-error').style.display='none'; });

        $('client-form').addEventListener('submit', e=>{
            e.preventDefault();
            const legal = $('company-legal-name').value.trim();
            const name = $('company-name').value.trim();
            let cnpj = $('company-cnpj').value.replace(/\D/g,'');
            const uf = $('company-uf').value;
            $('cnpj-error').style.display = 'none';
            if(!legal || !cnpj || !uf){ alert('Preencha os campos obrigatórios'); return; }
            if(cnpj.length !== 14 || !/^\d{14}$/.test(cnpj)){
                $('cnpj-error').textContent = 'CNPJ deve ter exatamente 14 dígitos numéricos';
                $('cnpj-error').style.display = 'block';
                return;
            }
            const clients = load(KEY_CLIENTS);
            const id = (clients.reduce((s,o)=>Math.max(s,o.id),0)||0)+1;
            clients.push({id, legal, name, cnpj, uf});
            save(KEY_CLIENTS, clients);
            $('client-form').reset();
            $('client-form-wrap').style.display='none';
            $('cnpj-error').style.display='none';
            renderAll();
        });

        // CONTRACTS
        function renderContracts(){
            const contracts = load(KEY_CONTRACTS);
            const tbody = $('contracts-tbody'); tbody.innerHTML = '';
            const clients = load(KEY_CLIENTS);
            contracts.forEach(ct=>{
                const client = clients.find(c=>c.id===ct.companyId);
                const status = (new Date(ct.end) < new Date()) ? 'Expirado' : 'Ativo';
                const modules = (ct.modules||[]).join(', ');
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${client?client.legal:'-'} </td>
                                                <td>${ct.start} → ${ct.end}</td>
                                                <td>${status}</td>
                                                <td>${modules}</td>
                                                <td>
                                                    <button data-id=\"${ct.id}\" class=\"edit-contract btn-small\">Editar</button>
                                                    <button data-id=\"${ct.id}\" class=\"del-contract btn-small\">Remover</button>
                                                </td>`;
                tbody.appendChild(tr);
            });
            tbody.querySelectorAll('.del-contract').forEach(b=>b.addEventListener('click', e=>{
                if(confirm('Remover contrato?')){
                    const id = +e.target.dataset.id;
                    save(KEY_CONTRACTS, load(KEY_CONTRACTS).filter(c=>c.id!==id));
                    renderAll();
                }
            }));
            tbody.querySelectorAll('.edit-contract').forEach(b=>b.addEventListener('click', e=>{
                const id = +e.target.dataset.id;
                const contracts = load(KEY_CONTRACTS);
                const contract = contracts.find(c=>c.id===id);
                if(contract){
                    $('contract-form-wrap').style.display='block';
                    $('contract-company').value = contract.companyId;
                    $('contract-start').value = contract.start;
                    $('contract-end').value = contract.end;
                    document.querySelectorAll('.module-checkbox').forEach(cb=>cb.checked = (contract.modules||[]).includes(cb.value));
                    const btn = $('contract-form').querySelector('button[type="submit"]');
                    const originalText = btn.textContent;
                    btn.textContent = 'Salvar';
                    $('contract-form').onsubmit = function(ev){
                        ev.preventDefault();
                        const companyId = +$('contract-company').value;
                        const start = $('contract-start').value;
                        const end = $('contract-end').value;
                        if(!companyId || !start || !end){ alert('Preencha todos os campos'); return; }
                        if(new Date(end) < new Date(start)){ alert('Data final deve ser posterior à inicial'); return; }
                        const modules = Array.from(document.querySelectorAll('.module-checkbox:checked')).map(i=>i.value);
                        const all = load(KEY_CONTRACTS);
                        const idx = all.findIndex(c=>c.id===id);
                        if(idx>-1){
                            all[idx] = {id, companyId, start, end, modules};
                            save(KEY_CONTRACTS, all);
                        }
                        $('contract-form').reset();
                        $('contract-form-wrap').style.display='none';
                        btn.textContent = originalText;
                        $('contract-form').onsubmit = null;
                        renderAll();
                    };
                    $('btn-cancel-contract').onclick = function(){
                        $('contract-form-wrap').style.display='none';
                        $('contract-form').reset();
                        btn.textContent = originalText;
                        $('contract-form').onsubmit = null;
                        $('btn-cancel-contract').onclick = null;
                    };
                }
            }));
        }

        $('btn-new-contract').addEventListener('click', ()=>{
            populateCompanySelects();
            $('contract-form-wrap').style.display='block';
        });
        $('btn-cancel-contract').addEventListener('click', ()=>{ $('contract-form-wrap').style.display='none'; $('contract-form').reset(); });

        function populateCompanySelects(){
            const clients = load(KEY_CLIENTS);
            const sel = $('contract-company'); sel.innerHTML = '<option value=\"\">Selecione</option>';
            const sel2 = $('user-company'); sel2.innerHTML = '<option value=\"\">Selecione</option>';
            clients.forEach(c=>{
                const opt = document.createElement('option'); opt.value = c.id; opt.textContent = `${c.legal} (${c.cnpj})`;
                sel.appendChild(opt);
                const opt2 = opt.cloneNode(true);
                sel2.appendChild(opt2);
            });
        }

        $('contract-form').addEventListener('submit', e=>{
            e.preventDefault();
            const companyId = +$('contract-company').value;
            const start = $('contract-start').value;
            const end = $('contract-end').value;
            if(!companyId || !start || !end){ alert('Preencha todos os campos'); return; }
            if(new Date(end) < new Date(start)){ alert('Data final deve ser posterior à inicial'); return; }
            const modules = Array.from(document.querySelectorAll('.module-checkbox:checked')).map(i=>i.value);
            const contracts = load(KEY_CONTRACTS);
            const id = (contracts.reduce((s,o)=>Math.max(s,o.id),0)||0)+1;
            contracts.push({id, companyId, start, end, modules});
            save(KEY_CONTRACTS, contracts);
            $('contract-form').reset();
            $('contract-form-wrap').style.display='none';
            renderAll();
        });

        // USERS
        function renderUsers(){
            const users = load(KEY_USERS);
            const tbody = $('users-tbody'); tbody.innerHTML='';
            const clients = load(KEY_CLIENTS);
            users.forEach(u=>{
                const companyName = clients.find(c=>c.id===u.companyId)?.legal || '-';
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${u.login}</td><td>${companyName}</td><td>
                    <button data-id=\"${u.id}\" class=\"edit-user btn-small\">Editar</button>
                    <button data-id=\"${u.id}\" class=\"del-user btn-small\">Remover</button>
                </td>`;
                tbody.appendChild(tr);
            });
            tbody.querySelectorAll('.del-user').forEach(b=>b.addEventListener('click', e=>{
                if(confirm('Remover usuário?')) {
                    save(KEY_USERS, load(KEY_USERS).filter(u=>u.id!==+e.target.dataset.id));
                    renderAll();
                }
            }));
            tbody.querySelectorAll('.edit-user').forEach(b=>b.addEventListener('click', e=>{
                const id = +e.target.dataset.id;
                const users = load(KEY_USERS);
                const user = users.find(u=>u.id===id);
                if(user){
                    const btn = $('user-form').querySelector('button[type="submit"]');
                    editingUserId = id;
                    $('user-login').value = user.login;
                    $('user-pass').value = user.pass;
                    $('user-company').value = user.companyId;
                    btn.textContent = 'Salvar usuário';
                    $('btn-cancel-user').style.display = 'inline-block';
                }
            }));
        }

        $('btn-cancel-user').addEventListener('click', ()=>{
            editingUserId = null;
            $('user-form').reset();
            $('user-form').querySelector('button[type="submit"]').textContent = 'Criar usuário';
            $('btn-cancel-user').style.display = 'none';
        });

        $('user-form').addEventListener('submit', e=>{
            e.preventDefault();
            const login = $('user-login').value.trim();
            const pass = $('user-pass').value;
            const companyId = parseInt($('user-company').value);
            if(!login || !pass || !companyId){ alert('Preencha todos os campos'); return; }
            const users = load(KEY_USERS);
            if(editingUserId !== null){
                if(users.some(u=>u.login===login && u.id!==editingUserId)){ alert('Usuário já existe'); return; }
                const idx = users.findIndex(u=>u.id===editingUserId);
                if(idx>-1){
                    users[idx] = {id: editingUserId, login, pass, companyId};
                }
                editingUserId = null;
                $('user-form').querySelector('button[type="submit"]').textContent = 'Criar usuário';
                $('btn-cancel-user').style.display = 'none';
            } else {
                if(users.some(u=>u.login===login)){ alert('Usuário já existe'); return; }
                const id = (users.reduce((s,o)=>Math.max(s,o.id),0)||0)+1;
                users.push({id, login, pass, companyId});
            }
            save(KEY_USERS, users);
            $('user-form').reset();
            renderAll();
        });

        function renderAll(){
            renderClients();
            renderContracts();
            renderUsers();
            populateCompanySelects();
        }

        function logoutMaster(){
            localStorage.removeItem('op_session_user');
            localStorage.removeItem('op_session_time');
            localStorage.removeItem('op_portal_session');
            window.location.href = 'index.html';
        }

        // initial render
        renderAll();
    </script>
</body>
</html>
